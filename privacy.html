<style>
  :root {
    --bg: #ffffff;
    --ink: #0d0d10;
    --ink-2: #3a3a40;

    --gut: clamp(22px, 5vw, 80px);

    --ff-heb: "Heebo", "Inter", sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--ff-latin); font-size: 17px; line-height: 1.7;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;

  html[lang="he"] body { font-family: var(--ff-heb); }
  .brand { font-family: var(--ff-latin) !important; direction: ltr; unicode-bidi: isolate; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding-inline: var(--gut); }
  h1, h2, h3 { margin: 0; font-weight: 600; letter-spacing: -0.02em; line-height: 1.12; }
  p { margin: 0; text-wrap: pretty; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; }

  /* Header */
  .site-header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.72);
    backdrop-filter: saturate(180%) blur(18px);
    -webkit-backdrop-filter: saturate(180%) blur(18px);
    border-bottom: 1px solid var(--line);
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
  .brand-mark { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--grad-green); flex: none; }
  .lang { display: inline-flex; align-items: center; gap: 2px; padding: 3px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,0.6); }
  .lang button { border: 0; background: transparent; color: var(--ink-soft); font-size: 13px; font-weight: 600; padding: 6px 13px; border-radius: 999px; line-height: 1; transition: color .2s ease, background .2s ease; }
  .lang button.active { background: var(--ink); color: #fff; }
  .lang button:not(.active):hover { color: var(--ink); }

  /* Legal document */
  .legal { padding: clamp(56px, 9vh, 104px) 0 clamp(64px, 10vh, 120px); }
  .legal .prose { max-width: var(--prose); margin: 0 auto; }
  .eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); margin: 0 0 18px; }
  html[lang="he"] .eyebrow { letter-spacing: 0.06em; text-transform: none; }
  .legal h1 { font-size: clamp(34px, 5.4vw, 56px); letter-spacing: -0.03em; }
  .updated { margin-top: 16px; font-size: 14px; color: var(--ink-soft); }
  .intro { margin-top: 28px; font-size: clamp(18px, 1.8vw, 20px); color: var(--ink-2); }
  .legal section { margin-top: clamp(34px, 4.6vw, 48px); }
  .legal h2 { font-size: clamp(20px, 2.4vw, 26px); letter-spacing: -0.02em; display: flex; gap: 12px; align-items: baseline; }
  .legal h2 .n { font-size: 14px; font-weight: 600; color: var(--ink-soft); font-variant-numeric: tabular-nums; flex: none; }
  .legal h2 + p, .legal p + p { margin-top: 14px; }
  .legal section > p { margin-top: 16px; color: var(--ink-2); }
  .legal ul { margin: 14px 0 0; padding-inline-start: 22px; color: var(--ink-2); }
  .legal li { margin-top: 8px; }
  .legal a.inline { color: var(--ink); border-bottom: 1px solid var(--line); }
  .legal a.inline:hover { border-bottom-color: var(--ink); }
  .disclaimer { margin-top: clamp(40px, 5vw, 56px); padding: 22px 24px; border: 1px solid var(--line); border-radius: 16px; background: #fbfbfc; color: var(--ink-soft); font-size: 14.5px; }

  /* Footer */
  .site-footer { border-top: 1px solid var(--line); padding: 44px 0; }
  .footer-inner { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .footer-left { display: flex; align-items: center; gap: 14px; color: var(--ink-soft); font-size: 14px; }
  .footer-right { display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
  .footer-links { display: flex; gap: 26px; font-size: 14px; color: var(--ink-soft); }
  .footer-links a:hover { color: var(--ink); }

  @media (max-width: 620px) {
    body { font-size: 16px; }
    .header-inner { height: 62px; }
    .footer-inner { flex-direction: column; align-items: flex-start; }
  }
</style>

      htmlEl.lang = lang;
      htmlEl.dir = lang === "he" ? "rtl" : "ltr";
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (dict[key] != null) el.textContent = dict[key];
      });
      document.querySelectorAll(".lang button").forEach(b => {
        b.classList.toggle("active", b.dataset.lang === lang);
      });
      try { localStorage.setItem("tdc-lang", lang); } catch (e) {}
    }
    document.querySelectorAll(".lang button").forEach(btn => {
      btn.addEventListener("click", () => setLang(btn.dataset.lang));
    });
